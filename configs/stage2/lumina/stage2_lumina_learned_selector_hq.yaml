stage: 2
run_name: stage2_lumina_learned_selector_hq
seed: 1234
max_iterations: 3
ascr_start_mode: baseline
return_initial_on_max_error: true
image_size: 1024
coarse_grid_size: 4
token_grid_size: 64
dilation: 1
output_dir: outputs/stage2_lumina_learned_selector_hq

generator:
  name: lumina
  checkpoint_path: models/lumina-dimoo
  repo_path: third_party/Lumina-DiMOO
  device: cuda
  guidance_scale: 4.0
  generation_timesteps: 64
  temperature: 1.0
  seed: 1234

evaluator:
  name: stage2_student
  backend: stage2_student
  checkpoint_path: checkpoints/stage2_selector_replay/selector_checkpoint.json
  device: cpu
  error_threshold: 0.5
  cell_threshold: 0.5
  max_selected_cells: 8

selector:
  name: grid_semantic
  coarse_grid_size: 4
  token_grid_size: 64
  dilation: 1
  max_selected_cells: 8
  min_confidence: 0.0
