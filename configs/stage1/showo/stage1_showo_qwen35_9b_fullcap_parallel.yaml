stage: 1
run_name: stage1_showo_qwen35_9b_fullcap_parallel
seed: 1234
max_iterations: 3
ascr_start_mode: baseline
return_initial_on_max_error: true
image_size: 512
coarse_grid_size: 4
token_grid_size: 32
dilation: 1
output_dir: outputs/stage1_qwen35_9b_fullcap_parallel

generator:
  name: showo
  repo_path: external/Show-o
  showo_config_path: configs/stage1/showo/showo_local_512x512.yaml
  checkpoint_path: models/show-o-512x512
  vq_model_path: models/magvitv2
  llm_model_path: models/phi-1_5
  device: cuda
  guidance_scale: 4
  generation_timesteps: 50
  seed: 1234
  native_token_loop: true
  confidence_steps: 50

evaluator:
  name: qwen_vl
  backend: qwen3_6
  model_path: models/qwen3.5-9b
  device: cuda
  device_map: auto
  torch_dtype: bfloat16
  processor_use_fast: false
  trust_remote_code: true
  local_files_only: true
  strict_json: true
  enable_thinking: true
  max_new_tokens: 768
  repair_max_new_tokens: 1024
  max_selected_cells: 8
  temperature: 0.0
  top_p: 1.0
  attn_implementation: null

selector:
  name: grid_semantic
  max_selected_cells: 8
  min_confidence: 0.0

tracing:
  enabled: true
  save_hidden_states: false
  save_confidence_maps: true
