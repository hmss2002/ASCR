# L40S memory fallback for schema-learning runs. Prefer the full 1024 config
# when bf16 + gradient checkpointing fits; 512 center-cropping can weaken
# 16x16 localization alignment.
repo_path: third_party/Lumina-DiMOO
checkpoint_path: models/lumina-dimoo
data_jsonl: outputs/stage4_self_corrupt/mmu_lora_hard64_dual/vq_tokens/lumina_sft/train.jsonl
output_dir: outputs/stage4_self_corrupt/mmu_lora_hard64_dual/vq_tokens/lora_l40s
epochs: 15
limit: null
lr: 3.0e-5
weight_decay: 0.01
image_size: 512
max_seq_len: 2048
prompt_max_length: 512
answer_max_length: 512
lora_r: 8
lora_alpha: 16
lora_dropout: 0.05
target_modules: q_proj,v_proj
torch_dtype: bfloat16
gradient_checkpointing: true
answer_mask_mode: all
ignore_pad_labels: true
seed: 0
