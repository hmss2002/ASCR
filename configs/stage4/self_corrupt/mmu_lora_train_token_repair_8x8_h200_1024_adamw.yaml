# H200 fast-path config for Stage-4 token repair.
# The previous L40S profile uses gradient checkpointing and 8-bit Adam to fit
# memory. H200 has enough headroom for a faster no-GC AdamW run.
repo_path: third_party/Lumina-DiMOO
checkpoint_path: models/lumina-dimoo
data_jsonl: outputs/stage4_token_repair/repair_cells_8x8/lumina_sft/train.jsonl
val_jsonl: outputs/stage4_token_repair/repair_cells_8x8/lumina_sft/val.jsonl
output_dir: outputs/stage4_token_repair/repair_cells_8x8/lora_h200_1024px_adamw
epochs: 15
limit: null
lr: 3.0e-5
weight_decay: 0.01
optimizer: adamw
image_size: 1024
max_seq_len: 6144
prompt_max_length: 512
answer_max_length: 128
lora_r: 8
lora_alpha: 16
lora_dropout: 0.05
target_modules: q_proj,v_proj,k_proj,o_proj,gate_proj,up_proj,down_proj
torch_dtype: bfloat16
gradient_checkpointing: false
gradient_checkpointing_fallback: off
answer_mask_mode: all
ignore_pad_labels: true
checkpoint_every_epochs: 1
early_stopping_patience: 3
early_stopping_min_delta: 0.0
validation_every_epochs: 3
progress_every_steps: 50
progress_bar: true
seed: 0
