stage: 1
run_name: stage1_mmada8b_self_direct_token
seed: 1234
max_iterations: 3
ascr_start_mode: baseline
return_initial_on_max_error: true
image_size: 512
coarse_grid_size: 4
token_grid_size: 32
select_grid_size: 32
dilation: 0
label_step: 4
output_dir: outputs/stage1_mmada8b_self_direct_token

generator:
  name: mmada
  repo_path: external/MMaDA
  checkpoint_path: models/mmada-8b-mixcot
  vq_model_path: models/magvitv2
  device: cuda
  guidance_scale: 3.5
  generation_timesteps: 15
  max_seq_length: 512
  seed: 1234

evaluator:
  name: mmada_self
  backend: mmada_self
  repo_path: external/MMaDA
  checkpoint_path: models/mmada-8b-mixcot
  vq_model_path: models/magvitv2
  device: cuda
  grid_size: 32
  image_size: 512
  max_new_tokens: 256
  max_selected_cells: 64

selector:
  name: direct_token
  select_grid_size: 32
  dilation: 0
  max_selected_cells: 64

tracing:
  enabled: true
  save_hidden_states: false
  save_confidence_maps: true
